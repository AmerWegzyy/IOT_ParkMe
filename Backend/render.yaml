# render.yaml
# Infrastructure-as-Code for deploying the ParkMe API to Render

services:
  - type: web
    name: parkme-backend
    env: docker
    plan: free # Can upgrade to 'starter' for production
    region: frankfurt # Or region closest to Technion
    healthCheckPath: /docs # Ensure the Swagger API docs are up
    envVars:
      - key: SUPABASE_URL
        sync: false # Set via Render dashboard securely
      - key: DATABASE_URL
        # We must use the Transaction Mode Pooler URL from Supabase (Port 6543)
        sync: false 
      - key: ESP32_HMAC_SECRET
        # The shared symmetric key for edge security
        sync: false
      - key: ENVIRONMENT
        value: production
