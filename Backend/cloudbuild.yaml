# cloudbuild.yaml
# CI/CD pipeline for deploying ParkMe API to Google Cloud Run

steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/parkme-backend', '.']

  # Push the image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/parkme-backend']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'parkme-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/parkme-backend'
      - '--region'
      - 'me-west1'  # Tel Aviv region, closest to Technion
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      # SSE streams are long-lived requests; default 300s timeout would kill them.
      - '--timeout'
      - '3600'
      # SSE clients and display commands live in process memory: exactly 1 instance.
      - '--max-instances'
      - '1'
      # Keep one instance warm so cold starts don't exceed the camera's 7s HTTP timeout.
      - '--min-instances'
      - '1'
      - '--memory'
      - '512Mi'
      - '--set-env-vars'
      - 'ENVIRONMENT=production,FIREBASE_PROJECT_ID=parkme-technion-f280b'

images:
  - 'gcr.io/$PROJECT_ID/parkme-backend'
