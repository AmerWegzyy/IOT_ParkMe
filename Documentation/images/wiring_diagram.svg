<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 760" font-family="Segoe UI, Arial, sans-serif">
  <rect x="0" y="0" width="1060" height="760" fill="#ffffff"/>
  <text x="530" y="42" text-anchor="middle" font-size="24" font-weight="bold" fill="#1a1a2e">ParkMe Wiring Diagram</text>
  <text x="530" y="66" text-anchor="middle" font-size="14" fill="#555">Sensor Node (ESP32 DevKit) + Camera Node (AI-Thinker ESP32-CAM) — pins match ESP32/SECRETS.h</text>

  <!-- ================= SENSOR NODE PANEL ================= -->
  <rect x="30" y="90" width="580" height="560" rx="12" fill="#f4f7fb" stroke="#b8c4d4"/>
  <text x="320" y="118" text-anchor="middle" font-size="17" font-weight="bold" fill="#23395d">SENSOR NODE</text>

  <!-- ESP32 DevKit body -->
  <rect x="80" y="140" width="160" height="470" rx="10" fill="#2e3440" stroke="#1a1e26" stroke-width="2"/>
  <rect x="130" y="150" width="60" height="34" rx="4" fill="#4c566a"/>
  <text x="160" y="172" text-anchor="middle" font-size="11" fill="#d8dee9">USB</text>
  <text x="160" y="215" text-anchor="middle" font-size="14" font-weight="bold" fill="#eceff4">ESP32</text>
  <text x="160" y="233" text-anchor="middle" font-size="11" fill="#c8cfdb">DevKit v1</text>

  <!-- ESP32 pins (right edge) -->
  <g font-size="12" fill="#eceff4" text-anchor="end">
    <circle cx="240" cy="260" r="5" fill="#e5e9f0" stroke="#111"/> <text x="228" y="264">VIN (5V)</text>
    <circle cx="240" cy="292" r="5" fill="#e5e9f0" stroke="#111"/> <text x="228" y="296">GND</text>
    <circle cx="240" cy="324" r="5" fill="#e5e9f0" stroke="#111"/> <text x="228" y="328">GPIO 5</text>
    <circle cx="240" cy="356" r="5" fill="#e5e9f0" stroke="#111"/> <text x="228" y="360">GPIO 18</text>
    <circle cx="240" cy="404" r="5" fill="#e5e9f0" stroke="#111"/> <text x="228" y="408">3V3</text>
    <circle cx="240" cy="436" r="5" fill="#e5e9f0" stroke="#111"/> <text x="228" y="440">GND</text>
    <circle cx="240" cy="468" r="5" fill="#e5e9f0" stroke="#111"/> <text x="228" y="472">GPIO 22</text>
    <circle cx="240" cy="500" r="5" fill="#e5e9f0" stroke="#111"/> <text x="228" y="504">GPIO 21</text>
    <circle cx="240" cy="548" r="5" fill="#e5e9f0" stroke="#111"/> <text x="228" y="552">GPIO 13</text>
    <circle cx="240" cy="580" r="5" fill="#e5e9f0" stroke="#111"/> <text x="228" y="584">GND</text>
  </g>

  <!-- HC-SR04 -->
  <rect x="400" y="230" width="180" height="110" rx="8" fill="#dfe8f4" stroke="#5b7ba6" stroke-width="2"/>
  <circle cx="440" cy="262" r="18" fill="#b7c8de" stroke="#5b7ba6"/>
  <circle cx="540" cy="262" r="18" fill="#b7c8de" stroke="#5b7ba6"/>
  <text x="490" y="266" text-anchor="middle" font-size="12" font-weight="bold" fill="#23395d">HC-SR04</text>
  <text x="490" y="330" text-anchor="middle" font-size="10" fill="#4a5c73">ultrasonic distance sensor</text>
  <g font-size="12" fill="#23395d" text-anchor="start">
    <circle cx="400" cy="245" r="5" fill="#fff" stroke="#111"/> <text x="410" y="249">VCC</text>
    <circle cx="400" cy="270" r="5" fill="#fff" stroke="#111"/> <text x="410" y="274">TRIG</text>
    <circle cx="400" cy="295" r="5" fill="#fff" stroke="#111"/> <text x="410" y="299">ECHO</text>
    <circle cx="400" cy="320" r="5" fill="#fff" stroke="#111"/> <text x="410" y="324">GND</text>
  </g>

  <!-- OLED SSD1306 -->
  <rect x="400" y="388" width="180" height="128" rx="8" fill="#1c2333" stroke="#3b4a66" stroke-width="2"/>
  <rect x="428" y="424" width="130" height="70" rx="3" fill="#0e5a8a"/>
  <text x="493" y="464" text-anchor="middle" font-size="12" fill="#7fd4ff">SPOT C1: FREE</text>
  <text x="505" y="510" text-anchor="middle" font-size="11" font-weight="bold" fill="#dfe8f4">OLED SSD1306 (I2C 0x3C)</text>
  <g font-size="12" fill="#dfe8f4" text-anchor="start">
    <circle cx="400" cy="404" r="5" fill="#fff" stroke="#111"/> <text x="410" y="408">VCC</text>
    <circle cx="400" cy="436" r="5" fill="#fff" stroke="#111"/> <text x="410" y="440">GND</text>
    <circle cx="400" cy="468" r="5" fill="#fff" stroke="#111"/> <text x="410" y="472">SCL</text>
    <circle cx="400" cy="500" r="5" fill="#fff" stroke="#111"/> <text x="410" y="504">SDA</text>
  </g>

  <!-- Calibration button -->
  <rect x="400" y="540" width="180" height="70" rx="8" fill="#fdf3d8" stroke="#c9a63c" stroke-width="2"/>
  <circle cx="490" cy="566" r="14" fill="#e0524d" stroke="#8e2f2c" stroke-width="2"/>
  <text x="490" y="600" text-anchor="middle" font-size="11" fill="#6b5a1e">calibration button (hold 4 s)</text>
  <g font-size="12" fill="#6b5a1e" text-anchor="start">
    <circle cx="400" cy="556" r="5" fill="#fff" stroke="#111"/> <text x="410" y="560">A</text>
    <circle cx="400" cy="586" r="5" fill="#fff" stroke="#111"/> <text x="410" y="590">B</text>
  </g>

  <!-- Wires: ESP32 -> HC-SR04 -->
  <path d="M240,260 H370 V245 H400" fill="none" stroke="#d64545" stroke-width="3"/>
  <path d="M240,292 H340 V320 H400" fill="none" stroke="#222222" stroke-width="3"/>
  <path d="M240,324 H355 V270 H400" fill="none" stroke="#2e9e4f" stroke-width="3"/>
  <path d="M240,356 H325 V295 H400" fill="none" stroke="#2b6fd6" stroke-width="3"/>

  <!-- Wires: ESP32 -> OLED (straight runs) -->
  <path d="M240,404 H400" fill="none" stroke="#e8842c" stroke-width="3"/>
  <path d="M240,436 H400" fill="none" stroke="#222222" stroke-width="3"/>
  <path d="M240,468 H400" fill="none" stroke="#159a9c" stroke-width="3"/>
  <path d="M240,500 H400" fill="none" stroke="#8b5cd6" stroke-width="3"/>

  <!-- Wires: ESP32 -> button -->
  <path d="M240,548 H340 V556 H400" fill="none" stroke="#c9a63c" stroke-width="3"/>
  <path d="M240,580 H355 V586 H400" fill="none" stroke="#222222" stroke-width="3"/>

  <!-- Battery note -->
  <text x="60" y="636" font-size="11" fill="#777">GPIO 34 (battery divider): optional, unwired on the bench — reads 0%</text>

  <!-- ================= CAMERA NODE PANEL ================= -->
  <rect x="650" y="90" width="380" height="380" rx="12" fill="#f7f4fb" stroke="#c4b8d4"/>
  <text x="840" y="118" text-anchor="middle" font-size="17" font-weight="bold" fill="#4a2d73">CAMERA NODE</text>

  <rect x="740" y="150" width="200" height="230" rx="10" fill="#2e3440" stroke="#1a1e26" stroke-width="2"/>
  <circle cx="840" cy="215" r="34" fill="#1a1e26" stroke="#666"/>
  <circle cx="840" cy="215" r="18" fill="#0d2b45" stroke="#4c88b8" stroke-width="2"/>
  <text x="840" y="278" text-anchor="middle" font-size="13" font-weight="bold" fill="#eceff4">AI-Thinker</text>
  <text x="840" y="296" text-anchor="middle" font-size="13" font-weight="bold" fill="#eceff4">ESP32-CAM</text>
  <text x="840" y="316" text-anchor="middle" font-size="10" fill="#c8cfdb">OV2640 + flash LED (GPIO 4) onboard</text>
  <g font-size="12" fill="#eceff4">
    <circle cx="740" cy="340" r="5" fill="#e5e9f0" stroke="#111"/> <text x="752" y="344">5V</text>
    <circle cx="740" cy="364" r="5" fill="#e5e9f0" stroke="#111"/> <text x="752" y="368">GND</text>
  </g>
  <path d="M740,340 H690 V300" fill="none" stroke="#d64545" stroke-width="3"/>
  <path d="M740,364 H674 V300" fill="none" stroke="#222222" stroke-width="3"/>
  <text x="682" y="288" text-anchor="middle" font-size="11" fill="#4a2d73">5V supply</text>

  <text x="840" y="408" text-anchor="middle" font-size="12" fill="#4a2d73" font-weight="bold">No other external wiring.</text>
  <text x="840" y="428" text-anchor="middle" font-size="11" fill="#666">IO0 → GND only while flashing firmware,</text>
  <text x="840" y="444" text-anchor="middle" font-size="11" fill="#666">then disconnect and press RST.</text>

  <!-- ESP-NOW link -->
  <path d="M612,330 C640,330 640,330 648,330" fill="none" stroke="#7a4fd0" stroke-width="3" stroke-dasharray="8 5"/>
  <path d="M612,330 l12,-7 v14 z" fill="#7a4fd0"/>
  <path d="M648,330 l-12,-7 v14 z" fill="#7a4fd0"/>
  <text x="630" y="308" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a4fd0">ESP-NOW</text>
  <text x="630" y="352" text-anchor="middle" font-size="10" fill="#7a4fd0">direct radio</text>
  <text x="630" y="366" text-anchor="middle" font-size="10" fill="#7a4fd0">(no router)</text>

  <!-- Cloud -->
  <ellipse cx="840" cy="560" rx="150" ry="52" fill="#e8f1fc" stroke="#5b8bd6" stroke-width="2"/>
  <text x="840" y="552" text-anchor="middle" font-size="13" font-weight="bold" fill="#23508e">Google Cloud Run backend</text>
  <text x="840" y="572" text-anchor="middle" font-size="11" fill="#4a6ea8">Firestore · Vision OCR · SSE dashboards</text>
  <path d="M840,472 V505" fill="none" stroke="#5b8bd6" stroke-width="3"/>
  <path d="M840,505 l-7,-12 h14 z" fill="#5b8bd6"/>
  <text x="852" y="494" font-size="11" fill="#5b8bd6">WiFi / HTTPS: photo upload</text>
  <path d="M320,652 V732 H1010 V560 H995" fill="none" stroke="#5b8bd6" stroke-width="3" stroke-dasharray="8 5"/>
  <path d="M995,560 l12,-7 v14 z" fill="#5b8bd6"/>
  <text x="480" y="724" text-anchor="middle" font-size="11" fill="#5b8bd6">WiFi / HTTPS: heartbeats up · OLED verdicts down (SSE)</text>

  <!-- Legend -->
  <g font-size="12" fill="#333">
    <text x="660" y="640" font-weight="bold">Wire legend</text>
    <rect x="660" y="650" width="22" height="5" fill="#d64545"/> <text x="690" y="657">5V power</text>
    <rect x="660" y="668" width="22" height="5" fill="#e8842c"/> <text x="690" y="675">3.3V power</text>
    <rect x="660" y="686" width="22" height="5" fill="#222222"/> <text x="690" y="693">GND</text>
    <rect x="660" y="704" width="22" height="5" fill="#c9a63c"/> <text x="690" y="711">Button (GPIO 13, internal pull-up)</text>
    <rect x="880" y="650" width="22" height="5" fill="#2e9e4f"/> <text x="910" y="657">TRIG (GPIO 5)</text>
    <rect x="880" y="668" width="22" height="5" fill="#2b6fd6"/> <text x="910" y="675">ECHO (GPIO 18)</text>
    <rect x="880" y="686" width="22" height="5" fill="#159a9c"/> <text x="910" y="693">SCL (GPIO 22)</text>
    <rect x="880" y="704" width="22" height="5" fill="#8b5cd6"/> <text x="910" y="711">SDA (GPIO 21)</text>
  </g>
</svg>
